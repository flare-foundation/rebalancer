default:
  tags:
    - flarenetwork-md

stages:
  - test
  - report
  - sbom
  - release-images

include:
  - template: Jobs/SAST.latest.gitlab-ci.yml
  - template: Jobs/Secret-Detection.latest.gitlab-ci.yml
  - component: gitlab.com/flarenetwork/ci-components-private/ai-code-review@2
    inputs:
      rules_condition: $CI_MERGE_REQUEST_IID != null && $GITLAB_USER_NAME != "SealBot" && $CI_MERGE_REQUEST_EVENT_TYPE != "merge_train"
      rules_when: always
      use_cursor_cli: false
      tags: ["flarenetwork-md"]
  - component: gitlab.com/flarenetwork/ci-components-private/release-image@2
    inputs:
        image_name: rebalancer
        image_tag_source: commit_tag
        build_tags: ['flarenetwork-md']
  - component: gitlab.com/flarenetwork/ci-components-private/lgtm@2
  - component: gitlab.com/flarenetwork/infra-public/ci-components/dependency-track@~latest
  - component: gitlab.com/flarenetwork/infra-public/ci-components/lint-dockerfile@1
  - component: gitlab.com/flarenetwork/infra-public/ci-components/lint-shell@1
    inputs:
      global_file_extensions: "*.sh"

sast:
  needs: []
  artifacts:
      expire_in: 3 days

secret_detection:
  needs: []
  artifacts:
      expire_in: 3 days
